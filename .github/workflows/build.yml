name: Build check

on:
  push:
    branches-ignore: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm install
      - run: npm run format:check
      - run: npm run build
